name: 每日自动更新晨间励志内容

on:
  schedule:
    # 每天 UTC 时间 0:00 运行（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  update-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 运行更新脚本
        run: |
          python scripts/update_site.py
        env:
          PYTHONIOENCODING: utf-8
      
      - name: 检查文件变更
        id: git-check
        run: |
          git diff --quiet index.html data/news.json || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: 提交并推送变更
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html data/news.json
          git commit -m "🤖 自动更新每日内容 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 输出更新结果
        run: |
          echo "✓ 内容更新完成"
          echo "✓ 更新时间：$(date '+%Y-%m-%d %H:%M:%S')"
